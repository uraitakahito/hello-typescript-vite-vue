# SPA (Vue Router + createWebHistory) を nginx で配信するための最小設定。
# Dockerfile.prod の runtime stage で /etc/nginx/conf.d/default.conf に
# COPY される想定。
#
# キモは `try_files $uri $uri/ /index.html;` の 1 行。
# createWebHistory は `/hello` のような path を URL に出すが、これを直接叩いた
# ときサーバ側で `/hello` というファイルは存在しない。try_files は:
#   1. $uri     → ファイルとしてヒットするか (/assets/index.js 等はこれで解決)
#   2. $uri/    → ディレクトリとしてヒットするか
#   3. /index.html → どちらでもなければ index.html を返す
# の順で解決し、3 段目で SPA の入口に fallback する。これがないと
# F5 リロードや直リンク時に 404 が出る。

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 教材として最小構成に留めているが、本番では下記も検討する:
    #   - assets ディレクトリへの長期 Cache-Control
    #   - gzip / brotli による事前圧縮配信
    #   - security headers (X-Content-Type-Options 等)
}
