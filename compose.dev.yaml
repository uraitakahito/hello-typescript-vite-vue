# Vite + Vue 3 の dev container 起動を一元化する compose ファイル。
# 旧 `compose.yml` を `compose.dev.yaml` / `compose.prod.yaml` の 2 本構成に
# 分離した結果。これにより本番側 (Dockerfile.prod の nginx 配信) も
# `docker compose -f compose.prod.yaml up` で対称に起動できる。
#
# 前提:
#   1. `Dockerfile.dev` / `docker-entrypoint.sh` / `.env` は `./setup.sh` で
#      生成される (Dockerfile.dev は uraitakahito/hello-javascript のタグから
#      curl 取得)。これらは .gitignore 済みで本リポジトリにはコミットしない。
#   2. `.env` に USER_ID / GROUP_ID / TZ が書かれている (setup.sh が `id -u` /
#      `id -g` を展開して書き込む)。Compose は同じディレクトリの `.env` を
#      自動で読むため、起動側で `export` する必要は無い。
#   3. GH_TOKEN は起動コマンドで明示渡し:
#        GH_TOKEN=$(gh auth token) docker compose -f compose.dev.yaml up -d --build

name: hello-typescript-vite-vue-dev

services:
  hello-typescript-vite-vue:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        # bind mount したファイルの所有権を host と揃えるため、
        # コンテナ内ユーザの uid / gid を host に合わせる。
        # `.env` で USER_ID / GROUP_ID を展開して渡す (1000 はフォールバック)。
        user_id: ${USER_ID:-1000}
        group_id: ${GROUP_ID:-1000}
        # `.env` で TZ=Asia/Tokyo を生成しているが、上書きしたい場合に備えて env 化。
        TZ: ${TZ:-Asia/Tokyo}
    image: hello-typescript-vite-vue:dev
    container_name: hello-typescript-vite-vue-container

    # `docker run --init` 相当。コンテナ内 PID 1 に tini を挟み、
    # ゾンビプロセス回収と SIGTERM 伝搬を行う保険。
    init: true

    # Vite dev server を host のブラウザに公開する port publish。
    # 5173 は vite.config.mts で `strictPort: true` 固定 (port 衝突時に
    # 黙って 5174 へ逃げず即 fail) なので、host 5173 ←→ コンテナ 5173 は
    # そのまま繋がるか即エラーかのどちらかになる。
    ports:
      - "5173:5173"

    environment:
      # ssh-agent 転送用ソケットパス。下の bind mount と必ずペアで指定する。
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
      # gh CLI 用。host で `gh auth token` が解決できる前提だが、
      # 未設定でも起動は通す (空文字フォールバック)。
      GH_TOKEN: ${GH_TOKEN:-}
      # コンテナ内 zsh の TERM をホスト側に合わせる (色 / 256-color 対応)。
      # 未設定なら xterm-256color にフォールバック。
      TERM: ${TERM:-xterm-256color}

    volumes:
      # ssh-agent ソケット: Docker Desktop for Mac の仮想ソケットで、
      # host の ssh-agent をコンテナ内 git push 等から流用する。
      # Linux ホストでは host 側パスを書き換える必要がある。
      - type: bind
        source: /run/host-services/ssh-auth.sock
        target: /run/host-services/ssh-auth.sock
      # リポジトリを /app に bind mount。コード編集が即コンテナに反映される。
      - type: bind
        source: .
        target: /app
      # zsh history を named volume に永続化 (dotfiles の myzshrc が
      # /zsh-volume を参照する)。`docker compose down` ではこの volume は
      # 残り、`docker compose down -v` で削除される。
      - type: volume
        source: zsh-history
        target: /zsh-volume

    # `docker exec -it ... zsh` でコンテナに入って作業する経路を想定
    # (VS Code Attach 以外)。tty / stdin_open が無いと exec した zsh が
    # ジョブコントロール無しになり、Ctrl-C / 行編集等の挙動が崩れる。
    tty: true
    stdin_open: true

    # Dockerfile.dev の CMD (`tail -F /dev/null`) は override しない。
    # 開発は VS Code Attach で /app に入るか、`docker exec` で zsh から手で叩く運用。

volumes:
  zsh-history:
    # 旧 `docker volume create $PROJECT-zsh-history` と同名を維持。
    # Compose のデフォルト命名は `<project>_zsh-history` だが、ここは明示。
    name: hello-typescript-vite-vue-zsh-history
